steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'us-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/avatar-reels-helper'
      - '.'

  # Step 2: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'us-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/avatar-reels-helper'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - avatar-reels-helper
      - '--image=us-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/avatar-reels-helper'
      - '--region=us-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'

images:
  - 'us-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/avatar-reels-helper'

options:
  logging: CLOUD_LOGGING_ONLY
